run:
  duration_hours: 0.01      # ~36s, just to verify orchestration
  interval_minutes: 1
  total_equity: 40000

strategies:
  - name: ma_cross_spy
    strategy: ma_cross
    symbol: SPY
    start: 2024-01-01
    params: {fast: 20, slow: 60}
  - name: rsi_qqq
    strategy: rsi_meanrev
    symbol: QQQ
    start: 2024-01-01
    params: {period: 14, low: 30, high: 70}
  - name: momentum_iwm
    strategy: momentum
    symbol: IWM
    start: 2023-01-01
    params: {lookback: 60}
  - name: donchian_dia
    strategy: donchian
    symbol: DIA
    start: 2024-01-01
    params: {lookback: 20}
